{% extends "includes/base.html" %}
{% load static %}

{% block title %}Analysis Successful | CEPAC{% endblock %}

{% block content %}
<section class="success-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xl-6 col-lg-8">
        <div class="success-card">
          <div class="success-header">
            <div class="success-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
            </div>
            <h1>Analysis Complete!</h1>
            <p class="success-subtitle">Your files are ready for download</p>
          </div>
          
          <div class="success-body">
            <div class="download-options">
              <a href="{{ kmz_link }}" class="download-btn kmz-download" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span>Download Updated KMZ</span>
              </a>
              
              <a href="{{ excel_link }}" class="download-btn excel-download" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <path d="M16 13H8"></path>
                  <path d="M16 17H8"></path>
                  <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span>Download Excel Summary</span>
              </a>
            </div>
            
            <div class="action-buttons">
              <a href="{% url 'kmz_polygon_analysis:form' %}" class="analyze-again-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18-5M22 12.5a10 10 0 0 1-18 5"></path>
                </svg>
                <span>Analyze Another File</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<style>
  .success-section {
    padding: 40px 0;
    background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
    display: flex;
    align-items: center;
  }

  .success-card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    overflow: hidden;
    text-align: center;
  }

  .success-header {
    padding: 40px 30px 20px;
    background: linear-gradient(135deg, #17a98a 0%, #17a98a 100%);
    color: white;
  }

  .success-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
  }

  .success-icon svg {
    stroke: white;
  }

  .success-header h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    color: white;
  }

  .success-subtitle {
    font-size: 16px;
    opacity: 0.9;
    margin-bottom: 0;
  }

  .success-body {
    padding: 40px;
  }

  .download-options {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 30px;
  }

  .download-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 8px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .kmz-download {
    background: #4a6cf7;
    color: white;
    box-shadow: 0 2px 5px rgba(74, 108, 247, 0.2);
  }

  .kmz-download:hover {
    background: #4a6cf7;
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(74, 108, 247, 0.3);
    color: white;
  }

  .excel-download {
    background: #17a98a;
    color: white;
    box-shadow: 0 2px 5px rgba(16, 185, 129, 0.2);
  }

  .excel-download:hover {
    background: #17a98a;
    color: white;    
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(16, 185, 129, 0.3);
  }

  .action-buttons {
    margin-top: 30px;
  }

  .analyze-again-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border: 2px solid #17a98a;
    border-radius: 8px;
    color: #17a98a;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .analyze-again-btn:hover {
    background: #f5f7ff;
    transform: translateY(-2px);
  }

  @media (max-width: 768px) {
    .success-section {
      padding: 40px 0;
    }
    
    .success-header {
      padding: 30px 20px 15px;
    }
    
    .success-body {
      padding: 30px 20px;
    }
    
    .success-icon {
      width: 60px;
      height: 60px;
    }
    
    .success-header h1 {
      font-size: 24px;
    }
  }
</style>
{% endblock %}
