{% extends "includes/base.html" %} {% load static %} {% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0 rounded-lg">
        <div class="card-header bg-success text-white text-center py-4">
          <h2 class="mb-0">
            <i class="bi bi-check-circle-fill me-2"></i>Logged Out Successfully
          </h2>
        </div>
        <div class="card-body p-5 text-center">
          <div class="mb-4">
            <i
              class="bi bi-check-circle text-success"
              style="font-size: 4rem"
            ></i>
          </div>
          <p class="mb-4 text-muted">
            You have been successfully logged out of your account. Thank you for
            using CEPAC!
          </p>
          <p class="mb-0">Ready to get back in?</p>
        </div>
        <div class="card-footer text-center py-3 bg-light">
          <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">
            <i class="bi bi-box-arrow-in-right me-2"></i>Log In Again
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
